<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Electron security: la CSP est appliquée exclusivement via les en-têtes HTTP
      (voir electron/main/index.ts -> onHeadersReceived). Une CSP en <meta> ne peut
      pas appliquer "frame-ancestors" (le navigateur ignore cette directive quand
      elle vient d'une balise <meta>, d'où l'avertissement "The Content Security
      Policy directive 'frame-ancestors' is ignored..."). On évite donc toute
      duplication ici.
    -->
    <title>Git Architect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
